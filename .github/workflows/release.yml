name: Release duoduo-in-obsidian

on:
  push:
    tags:
      - "v*" # e.g. v0.1.0

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to create GitHub Releases and upload assets

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Create release zip
        run: |
          cd dist
          zip -r "../duoduo-in-obsidian-${GITHUB_REF_NAME}.zip" .

      - name: Create GitHub Release and upload zip
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: duoduo in Obsidian ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: duoduo-in-obsidian-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
